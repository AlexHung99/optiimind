<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Optiimind</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d0c;
      --panel: #121816;
      --line: #263330;
      --text: #f4f0e8;
      --muted: #b7c0bb;
      --accent: #2fd4c8;
      --gold: #d8b978;
      --danger: #ff8a80;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(140deg, rgba(47, 212, 200, 0.12), transparent 32%),
        linear-gradient(210deg, rgba(216, 185, 120, 0.12), transparent 38%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1080px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 48px;
      align-items: center;
      padding: 48px 0;
    }

    a { color: inherit; }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--gold);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 18px;
    }

    h1 {
      margin: 34px 0 16px;
      font-size: clamp(40px, 7vw, 72px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.75;
    }

    .mail-list {
      display: grid;
      gap: 12px;
      margin-top: 34px;
      color: var(--muted);
    }

    .mail-list a {
      width: fit-content;
      color: var(--text);
      text-decoration-color: rgba(47, 212, 200, 0.55);
      text-underline-offset: 4px;
    }

    form {
      background: rgba(18, 24, 22, 0.9);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 26px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0c1110;
      color: var(--text);
      font: inherit;
      padding: 13px 14px;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 212, 200, 0.14);
    }

    textarea {
      min-height: 170px;
      resize: vertical;
    }

    .field { margin-bottom: 18px; }

    .hp {
      position: absolute;
      left: -10000px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #06110f;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      padding: 14px 18px;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--accent); }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
        gap: 28px;
        align-items: start;
      }

      h1 { margin-top: 28px; }
      form { padding: 20px; }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <a class="brand" href="/">
        <span class="mark">O</span>
        <span>Optiimind</span>
      </a>
      <h1>聯絡我</h1>
      <p class="lead">
        有合作、產品、顧問或任何想法，都可以從這裡發訊息。我會主要在 max 信箱收信，表單會寄到 hello 並自動 cc 給 max。
      </p>
      <div class="mail-list">
        <span>主要信箱：<a href="mailto:max@optiimind.com">max@optiimind.com</a></span>
        <span>聯絡入口：<a href="mailto:hello@optiimind.com">hello@optiimind.com</a></span>
      </div>
    </section>

    <form id="contact-form">
      <div class="field">
        <label for="name">姓名</label>
        <input id="name" name="name" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="subject">主旨</label>
        <input id="subject" name="subject" required>
      </div>
      <div class="field">
        <label for="message">訊息</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <input class="hp" name="company" tabindex="-1" autocomplete="off">
      <button type="submit">送出訊息</button>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById('contact-form');
    const statusEl = document.getElementById('status');
    const button = form.querySelector('button');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      statusEl.className = 'status';
      statusEl.textContent = '正在送出...';
      button.disabled = true;

      const payload = Object.fromEntries(new FormData(form).entries());

      try {
        const response = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || '訊息送出失敗');

        form.reset();
        statusEl.className = 'status success';
        statusEl.textContent = '已送出，我會盡快回覆你。';
      } catch (error) {
        statusEl.className = 'status error';
        statusEl.textContent = error.message || '訊息送出失敗，請稍後再試。';
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
